<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
    content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="Author" content="Roberto FT/Malyend">
    <meta name="referrer" content="no-refferer">

    <title>OneChance</title>

    <link rel="stylesheet" href="./toDo.Css">
    <link rel="manifest" href="./OneChance.webmanifest">
    <link rel="icon" href="./Images/maskable_icon_x512.png" type="favicon/png">
    <link rel="apple-touch-icon" sizes="128x128" href="./Images/maskable_icon_x128.png">
</head>
<body>
    
    <section id="Start-screen">
        <h1>OneChance</h1>
        <p class="greeting">Welcome to One Chance </p>
        <p>The Chance to make a difference in your life.</p>
        <p>Please, specify a check in and a check out time:</p>

        <form id="Check">
            <label for="check-in">Check in</label>
            <input
            id="check-in"
             type="time" 
             value="09:00"
             step="900">

             <label for="check-out">Check out</label>
             <input
             id="check-out"
             type="time"
             value="23:00"
             step="900">
            <div class="button-1-cont">
             <input id="Confirm" name="Confirm" type="button" value="Submit">
            <input id="Exit" name="Exit" type="button" value="Exit"> 
            </div>
        </form>
    </section>

    <section id="check-in-screen" class="five-tasks" screen="check-in">
        <h1>OneChance</h1>
        <p class="greeting">Goodmorning </p>
         <p>You drool in your sleep</p>

         <p> What five tasks will you do today?</p>

            <form id="five-in">
                <label>What commitments will you choose?</label>
                <input name="tasks" id="task1" type="text" placeholder="Task 1">
                <input name="tasks" id="task2" type="text" placeholder="Task 2">
                <input name="tasks" id="task3" type="text" placeholder="Task 3">
                <input name="tasks" id="task4" type="text" placeholder="Task 4">
                <input name="tasks" id="task5" type="text" placeholder="Task 5">
                <br>
                <input id="Confirm-1" name="Confirm" type="button" value="Submit">
                <input id="Exit-1" name="Exit" type="button" value="Exit"> 
           </form>

    </section>

    <section id="check-out-screen" class="five-tasks" screen="check-out">
        <h1>OneChance</h1>
        <p class="greeting">Good Evening</p>
        <p>Long day?</p>

        <p>What five tasks have you completed?</p>

        <form id="five-out">
            <label>Have you committed?</label>

            <div class="task-row">
             <input name="tasks" id="task1-out" type="text" placeholder="Task 1" value="" readonly> 
                <input type="checkbox" id="task1Box">
            </div>

            <div class="task-row">
                <input name="tasks" id="task2-out" type="text" placeholder="Task 2" readonly>
                <input type="checkbox" id="task2Box">
            </div>

            <div class="task-row">
           <input name="tasks" id="task3-out" type="text" placeholder="Task 3" readonly> 
                <input type="checkbox" id="task3Box">
            </div>

            <div class="task-row">
                <input name="tasks" id="task4-out" type="text" placeholder="Task 4" readonly> 
                <input type="checkbox" id="task4Box">
            </div>

            <div class="task-row">
                <input name="tasks" id="task5-out" type="text" placeholder="Task 5" readonly>
                <input type="checkbox" id="task5Box">
            </div>

            <br>
                <input id="Confirm-2" name="Confirm" type="button" value="Submit">
                <input id="Exit-2" name="Exit" type="button" value="Exit"> 
        </form>

        
    </section>
<script src="./toDo.js"></script>
</body>
</html>
