<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="Author" content="Roberto FT/Malyend">
    <meta name="referrer" content="no-refferer">

    <title>OneChance</title>

    <link rel="stylesheet" href="toDo.Css">
</head>
<body>
    
    <!--
   1. I need a prompt screen to set up check in and check out times
   2. I need another prompt screen to add five tasks
   3. I need a prompt screen to check the tasks
    -->

    <section id="Start-screen">
        <h1>OneChance</h1>
        <p class="greeting">Welcome to One Chance </p>
        <p>The Chance to make a difference in your life.</p>
        <p>Please, specify a check in and a check out time:</p>

        <form id="Check">
            <label for="check-in">Check in</label>
            <input
            id="check-in"
             type="time" 
             value="09:00"
             step="900">

             <label for="check-out">Check out</label>
             <input
             id="check-out"
             type="time"
             value="23:00"
             step="900">
        </form>
    </section>

    <section class="five-tasks">
        <h1>OneChance</h1>
        <p class="greeting">Goodmorning </p>
         <p>You drool in your sleep</p>

         <p> What five tasks will you do today?</p>

            <form id="five-in">
                <label>What commitments will you choose?</label>
                <input name="tasks" id="task1" type="text" value="Task 1">
                <input name="tasks" id="task2" type="text" value="Task 2">
                <input name="tasks" id="task3" type="text" value="Task 3">
                <input name="tasks" id="task4" type="text" value="Task 4">
                <input name="tasks" id="task5" type="text" value="Task 5">
                <br>
                <input id="Confirm-1" name="Confirm" type="button" value="confirm">
                <input id="Exit-1" name="Exit" type="button" value="Exit"> 
           </form>

    </section>

    <section class="five-tasks">
        <h1>OneChance</h1>
        <p class="greeting">Good Evening</p>
        <p>Long day?</p>

        <p>What five tasks have you completed?</p>

        <form id="five-out">
            <label>Have you committed?</label>

                <input name="tasks" id="task1-out" type="text" value="Task 1"> 
                <input type="checkbox" id="task1Box">

                <input name="tasks" id="task2-out" type="text" value="Task 2">
                <input type="checkbox" id="task2Box">

                <input name="tasks" id="task3-out" type="text" value="Task 3">
                <input type="checkbox" id="task3Box">

                <input name="tasks" id="task4-out" type="text" value="Task 4">
                <input type="checkbox" id="task4Box">

                <input name="tasks" id="task5-out" type="text" value="Task 5">
                <input type="checkbox" id="task5Box">
            <br>
                <input id="Confirm-2" name="Confirm" type="button" value="confirm">
                <input id="Exit-2" name="Exit" type="button" value="Exit"> 
        </form>
    </section>

</body>
</html>
